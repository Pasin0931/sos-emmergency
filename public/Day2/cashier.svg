    <circle cx="99" cy="163" r="6" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <circle cx="119" cy="163" r="6" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <circle cx="139" cy="163" r="6" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
