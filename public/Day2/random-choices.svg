<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Input arrow shaft from left -->
    <line x1="58" y1="128" x2="108" y2="128" stroke="#D9A441" stroke-width="6"/>
    <!-- Junction dot -->
    <circle cx="108" cy="128" r="7" fill="#D9A441"/>
    <!-- Top branch arrow -->
    <line x1="108" y1="128" x2="180" y2="88" stroke="#D9A441" stroke-width="5"/>
    <polygon points="183,85 168,82 175,97" fill="#D9A441"/>
    <!-- Middle branch arrow -->
    <line x1="108" y1="128" x2="185" y2="128" stroke="#D9A441" stroke-width="5"/>
    <polygon points="188,128 175,121 175,135" fill="#D9A441"/>
    <!-- Bottom branch arrow -->
    <line x1="108" y1="128" x2="180" y2="168" stroke="#D9A441" stroke-width="5"/>
    <polygon points="183,171 175,159 168,174" fill="#D9A441"/>
    <!-- Input arrow head -->
    <polygon points="111,128 99,121 99,135" fill="#D9A441"/>
    <!-- Small circle endpoints on outputs -->
    <circle cx="185" cy="88" r="5" fill="#B5651D"/>
    <circle cx="190" cy="128" r="5" fill="#B5651D"/>
    <circle cx="185" cy="168" r="5" fill="#B5651D"/>
  </g>
</svg>
