<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Left platform block -->
    <rect x="52" y="162" width="54" height="30" rx="4" ry="4" fill="#8B5E34" stroke="#6B4423" stroke-width="5"/>
    <!-- Right platform block (higher) -->
    <rect x="150" y="148" width="54" height="44" rx="4" ry="4" fill="#8B5E34" stroke="#6B4423" stroke-width="5"/>
    <!-- Stick figure airborne in center -->
    <!-- Head -->
    <circle cx="128" cy="96" r="12" fill="none" stroke="#6B4423" stroke-width="5"/>
    <!-- Body -->
    <line x1="128" y1="108" x2="128" y2="138" stroke="#6B4423" stroke-width="5"/>
    <!-- Arms spread (leaning forward) -->
    <line x1="128" y1="116" x2="105" y2="108" stroke="#6B4423" stroke-width="5"/>
    <line x1="128" y1="116" x2="150" y2="110" stroke="#6B4423" stroke-width="5"/>
    <!-- Left leg bent down-back -->
    <line x1="128" y1="138" x2="112" y2="155" stroke="#6B4423" stroke-width="5"/>
    <line x1="112" y1="155" x2="100" y2="148" stroke="#6B4423" stroke-width="5"/>
    <!-- Right leg bent forward -->
    <line x1="128" y1="138" x2="148" y2="152" stroke="#6B4423" stroke-width="5"/>
    <line x1="148" y1="152" x2="158" y2="145" stroke="#6B4423" stroke-width="5"/>
    <!-- Motion lines suggesting speed -->
    <line x1="60" y1="104" x2="80" y2="104" stroke="#D9A441" stroke-width="3" opacity="0.7"/>
    <line x1="56" y1="112" x2="74" y2="112" stroke="#D9A441" stroke-width="3" opacity="0.5"/>
  </g>
</svg>
