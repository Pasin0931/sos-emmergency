    <line x1="148" y1="128" x2="140" y2="128" stroke="#8B5E34" stroke-width="3"/>
    <line x1="128" y1="148" x2="128" y2="140" stroke="#8B5E34" stroke-width="3"/>
    <line x1="108" y1="128" x2="116" y2="128" stroke="#8B5E34" stroke-width="3"/>
  </g>
