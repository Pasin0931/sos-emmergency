<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Die body: slightly rotated rounded rectangle -->
    <rect x="72" y="72" width="112" height="112" rx="20" ry="20" fill="#FBF3DE" stroke="#6B4423" stroke-width="6" transform="rotate(10, 128, 128)"/>
    <!-- 5-face dots: corners + center -->
    <!-- Top-left dot -->
    <circle cx="102" cy="100" r="9" fill="#6B4423" transform="rotate(10, 128, 128)"/>
    <!-- Top-right dot -->
    <circle cx="154" cy="100" r="9" fill="#6B4423" transform="rotate(10, 128, 128)"/>
    <!-- Center dot -->
    <circle cx="128" cy="128" r="9" fill="#6B4423" transform="rotate(10, 128, 128)"/>
    <!-- Bottom-left dot -->
    <circle cx="102" cy="156" r="9" fill="#6B4423" transform="rotate(10, 128, 128)"/>
    <!-- Bottom-right dot -->
    <circle cx="154" cy="156" r="9" fill="#6B4423" transform="rotate(10, 128, 128)"/>
  </g>
</svg>
