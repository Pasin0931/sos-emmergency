<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Factory main building body -->
    <rect x="68" y="148" width="120" height="58" rx="4" ry="4" fill="#8B5E34" stroke="#6B4423" stroke-width="5"/>
    <!-- Roof of main building -->
    <rect x="68" y="140" width="120" height="12" rx="2" ry="2" fill="#6B4423"/>
    <!-- Left smokestack -->
    <rect x="84" y="90" width="22" height="58" rx="4" ry="4" fill="#8B5E34" stroke="#6B4423" stroke-width="4"/>
    <!-- Right smokestack -->
    <rect x="150" y="105" width="22" height="43" rx="4" ry="4" fill="#8B5E34" stroke="#6B4423" stroke-width="4"/>
    <!-- Smoke puffs from left stack -->
    <circle cx="95" cy="82" r="8" fill="#E4D0A4" stroke="#8B5E34" stroke-width="2" opacity="0.8"/>
    <circle cx="103" cy="70" r="6" fill="#E4D0A4" stroke="#8B5E34" stroke-width="2" opacity="0.6"/>
    <circle cx="88" cy="68" r="5" fill="#E4D0A4" stroke="#8B5E34" stroke-width="2" opacity="0.5"/>
    <!-- Smoke puffs from right stack -->
    <circle cx="161" cy="97" r="7" fill="#E4D0A4" stroke="#8B5E34" stroke-width="2" opacity="0.8"/>
    <circle cx="169" cy="86" r="5" fill="#E4D0A4" stroke="#8B5E34" stroke-width="2" opacity="0.6"/>
    <!-- Windows on main building -->
    <rect x="82" y="158" width="20" height="16" rx="2" ry="2" fill="#D9A441" opacity="0.8"/>
    <rect x="118" y="158" width="20" height="16" rx="2" ry="2" fill="#D9A441" opacity="0.8"/>
    <rect x="154" y="158" width="20" height="16" rx="2" ry="2" fill="#D9A441" opacity="0.8"/>
    <!-- Door -->
    <rect x="112" y="176" width="32" height="30" rx="3" ry="3" fill="#6B4423"/>
  </g>
</svg>
