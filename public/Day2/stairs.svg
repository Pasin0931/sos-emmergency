<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Staircase: 4 steps going up-right, filled solid blocks -->
    <!-- Step 1 (bottom-left, tallest column) -->
    <rect x="62" y="102" width="38" height="82" rx="3" fill="#D9A441" stroke="#6B4423" stroke-width="5"/>
    <!-- Step 2 -->
    <rect x="100" y="122" width="38" height="62" rx="3" fill="#B5651D" stroke="#6B4423" stroke-width="5"/>
    <!-- Step 3 -->
    <rect x="138" y="142" width="38" height="42" rx="3" fill="#D9A441" stroke="#6B4423" stroke-width="5"/>
    <!-- Step 4 (top-right, shortest column) -->
    <rect x="176" y="162" width="20" height="22" rx="3" fill="#B5651D" stroke="#6B4423" stroke-width="5"/>
  </g>
</svg>
