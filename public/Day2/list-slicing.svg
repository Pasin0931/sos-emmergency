<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Four array boxes -->
    <rect x="44" y="112" width="40" height="40" rx="5" fill="#FBF3DE" stroke="#6B4423" stroke-width="5"/>
    <rect x="88" y="112" width="40" height="40" rx="5" fill="#D9A441" stroke="#6B4423" stroke-width="5"/>
    <rect x="132" y="112" width="40" height="40" rx="5" fill="#D9A441" stroke="#6B4423" stroke-width="5"/>
    <rect x="176" y="112" width="40" height="40" rx="5" fill="#FBF3DE" stroke="#6B4423" stroke-width="5"/>
    <!-- Scissor cut line between box 2 and 3 (at x=132) -->
    <line x1="132" y1="96" x2="132" y2="168" stroke="#6B4423" stroke-width="3" stroke-dasharray="5 3"/>
    <!-- Scissors icon at top of cut line -->
    <!-- Left blade -->
    <path d="M122,86 Q128,96 118,100" fill="none" stroke="#6B4423" stroke-width="4"/>
    <circle cx="116" cy="102" r="5" fill="none" stroke="#6B4423" stroke-width="4"/>
    <!-- Right blade -->
    <path d="M142,86 Q136,96 146,100" fill="none" stroke="#6B4423" stroke-width="4"/>
    <circle cx="148" cy="102" r="5" fill="none" stroke="#6B4423" stroke-width="4"/>
    <!-- Pivot -->
    <circle cx="132" cy="90" r="3" fill="#6B4423"/>
  </g>
</svg>
