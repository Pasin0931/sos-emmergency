<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Left column of binary digits (1s and 0s represented as shapes) -->
    <!-- Row 1: 1 = filled rect, 0 = empty circle -->
    <!-- Col 1 -->
    <rect x="80" y="82" width="18" height="24" rx="3" fill="#6B4423"/>
    <!-- Col 2 -->
    <circle cx="138" cy="94" r="11" fill="none" stroke="#6B4423" stroke-width="5"/>
    <!-- Row 2 -->
    <circle cx="89" cy="122" r="11" fill="none" stroke="#6B4423" stroke-width="5"/>
    <rect x="127" y="110" width="18" height="24" rx="3" fill="#6B4423"/>
    <!-- Row 3 -->
    <rect x="80" y="142" width="18" height="24" rx="3" fill="#D9A441" stroke="#6B4423" stroke-width="3"/>
    <rect x="127" y="142" width="18" height="24" rx="3" fill="#D9A441" stroke="#6B4423" stroke-width="3"/>
    <!-- Row 4 -->
    <circle cx="89" cy="182" r="11" fill="none" stroke="#6B7A99" stroke-width="5"/>
    <circle cx="136" cy="182" r="11" fill="none" stroke="#6B7A99" stroke-width="5"/>
    <!-- Extra column -->
    <!-- Col 3 -->
    <rect x="164" y="82" width="18" height="24" rx="3" fill="#6B4423"/>
    <circle cx="173" cy="122" r="11" fill="none" stroke="#6B4423" stroke-width="5"/>
    <circle cx="173" cy="158" r="11" fill="none" stroke="#D9A441" stroke-width="5"/>
    <rect x="164" y="170" width="18" height="24" rx="3" fill="#6B7A99"/>
  </g>
</svg>
