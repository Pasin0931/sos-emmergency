<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Round shield behind sword -->
    <circle cx="120" cy="138" r="52" fill="#6B7A99" stroke="#6B4423" stroke-width="5"/>
    <!-- Shield boss (center decoration) -->
    <circle cx="120" cy="138" r="10" fill="#D9A441" stroke="#6B4423" stroke-width="3"/>
    <!-- Shield cross detail -->
    <line x1="120" y1="92" x2="120" y2="184" stroke="#6B4423" stroke-width="3" opacity="0.5"/>
    <line x1="74" y1="138" x2="166" y2="138" stroke="#6B4423" stroke-width="3" opacity="0.5"/>
    <!-- Sword blade (vertical, pointing up, overlapping shield) -->
    <polygon points="136,58 130,58 126,172 140,172" fill="#D9A441" stroke="#6B4423" stroke-width="3"/>
    <!-- Sword tip -->
    <polygon points="133,52 126,72 140,72" fill="#D9A441" stroke="#6B4423" stroke-width="2"/>
    <!-- Sword crossguard -->
    <rect x="116" y="168" width="34" height="10" rx="4" ry="4" fill="#B5651D" stroke="#6B4423" stroke-width="3"/>
    <!-- Sword grip -->
    <rect x="125" y="178" width="16" height="26" rx="4" ry="4" fill="#8B5E34" stroke="#6B4423" stroke-width="3"/>
    <!-- Sword pommel -->
    <circle cx="133" cy="207" r="8" fill="#D9A441" stroke="#6B4423" stroke-width="3"/>
    <!-- Sword fuller (groove line) -->
    <line x1="133" y1="62" x2="133" y2="168" stroke="#FBF3DE" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
