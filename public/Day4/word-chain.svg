<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Chain link 1 (top-left) -->
    <ellipse cx="94" cy="102" rx="22" ry="13" fill="none" stroke="#6B4423" stroke-width="8" transform="rotate(-40 94 102)"/>
    <ellipse cx="94" cy="102" rx="22" ry="13" fill="#FBF3DE" stroke="none" transform="rotate(-40 94 102)"/>
    <ellipse cx="94" cy="102" rx="22" ry="13" fill="none" stroke="#6B4423" stroke-width="8" transform="rotate(-40 94 102)"/>
    <!-- Chain link 2 (middle) — overlapping -->
    <ellipse cx="128" cy="128" rx="22" ry="13" fill="#F1E3C2" stroke="#6B4423" stroke-width="8" transform="rotate(-40 128 128)"/>
    <!-- Re-draw part of link 1 over link 2 for overlap effect -->
    <path d="M82,90 Q70,98 72,110 Q74,120 86,122" fill="none" stroke="#6B4423" stroke-width="8" stroke-linecap="round"/>
    <!-- Chain link 3 (bottom-right) -->
    <ellipse cx="162" cy="154" rx="22" ry="13" fill="#F1E3C2" stroke="#6B4423" stroke-width="8" transform="rotate(-40 162 154)"/>
    <!-- Re-draw part of link 2 over link 3 -->
    <path d="M116,116 Q104,124 106,136 Q108,146 120,148" fill="none" stroke="#6B4423" stroke-width="8" stroke-linecap="round"/>
    <!-- Gold accent dots -->
    <circle cx="94" cy="102" r="4" fill="#D9A441"/>
    <circle cx="128" cy="128" r="4" fill="#D9A441"/>
    <circle cx="162" cy="154" r="4" fill="#D9A441"/>
  </g>
</svg>
