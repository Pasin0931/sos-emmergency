<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Calendar frame -->
    <rect x="72" y="88" width="112" height="90" rx="8" fill="#FBF3DE" stroke="#6B4423" stroke-width="5"/>
    <!-- Calendar header bar -->
    <rect x="72" y="88" width="112" height="24" rx="8" fill="#6B4423"/>
    <rect x="72" y="100" width="112" height="12" fill="#6B4423"/>
    <!-- Calendar rings -->
    <rect x="100" y="80" width="8" height="18" rx="4" fill="#8B5E34" stroke="#6B4423" stroke-width="3"/>
    <rect x="148" y="80" width="8" height="18" rx="4" fill="#8B5E34" stroke="#6B4423" stroke-width="3"/>
    <!-- 7 day squares row 1 (Mon highlighted in gold) -->
    <rect x="80" y="122" width="12" height="12" rx="2" fill="#D9A441" stroke="#6B4423" stroke-width="2"/>
    <rect x="96" y="122" width="12" height="12" rx="2" fill="#D9A441" stroke="#6B4423" stroke-width="2"/>
    <rect x="112" y="122" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="128" y="122" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="144" y="122" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="160" y="122" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="80" y="122" width="12" height="12" rx="2" fill="#D9A441" stroke="#6B4423" stroke-width="2"/>
    <!-- 7 day squares row 2 -->
    <rect x="80" y="140" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="96" y="140" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="112" y="140" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="128" y="140" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="144" y="140" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="160" y="140" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <!-- Row 3 partial -->
    <rect x="80" y="158" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="96" y="158" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="112" y="158" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <!-- Redraw the 7th square in row 1 at correct position -->
    <rect x="176" y="122" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
    <rect x="176" y="140" width="12" height="12" rx="2" fill="#FBF3DE" stroke="#6B4423" stroke-width="2"/>
  </g>
</svg>
