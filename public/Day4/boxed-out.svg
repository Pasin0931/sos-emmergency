<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Main square box -->
    <rect x="80" y="84" width="90" height="90" rx="4" fill="#FBF3DE" stroke="#6B4423" stroke-width="6"/>
    <!-- Small circle positioned outside the box (bottom-right corner) -->
    <circle cx="188" cy="192" r="18" fill="#D9A441" stroke="#6B4423" stroke-width="5"/>
    <!-- Arrow suggesting the circle is being pushed outside -->
    <line x1="170" y1="174" x2="180" y2="184" stroke="#6B4423" stroke-width="4"/>
    <!-- X mark on the circle to indicate exclusion -->
    <line x1="181" y1="185" x2="195" y2="199" stroke="#6B4423" stroke-width="3.5"/>
    <line x1="195" y1="185" x2="181" y2="199" stroke="#6B4423" stroke-width="3.5"/>
    <!-- Dashed indicator line from corner of box to circle -->
    <line x1="170" y1="174" x2="175" y2="179" stroke="#8B5E34" stroke-width="3" stroke-dasharray="4 3"/>
  </g>
</svg>
