<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="face" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#FBF3DE"/>
      <stop offset="70%" stop-color="#F1E3C2"/>
      <stop offset="100%" stop-color="#E4D0A4"/>
    </radialGradient>
    <radialGradient id="candyGrad" cx="35%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#F5C0D2"/>
      <stop offset="60%" stop-color="#E59BB5"/>
      <stop offset="100%" stop-color="#C97096"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="118" fill="#6E3D14"/>
  <circle cx="128" cy="128" r="112" fill="#9A571E"/>
  <circle cx="128" cy="128" r="100" fill="url(#face)" stroke="#6E3D14" stroke-width="2"/>
  <circle cx="128" cy="128" r="100" fill="none" stroke="#E4D0A4" stroke-width="6" stroke-dasharray="2 7" opacity="0.7"/>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Lollipop stick -->
    <line x1="120" y1="148" x2="148" y2="186" stroke="#8B5E34" stroke-width="7"/>
    <!-- Lollipop candy circle -->
    <circle cx="108" cy="128" r="34" fill="url(#candyGrad)" stroke="#6B4423" stroke-width="5"/>
    <!-- Candy swirl pattern -->
    <path d="M108,98 Q130,100 132,120 Q134,140 114,146 Q94,148 90,128 Q88,110 104,102"
          fill="none" stroke="#FBF3DE" stroke-width="4" opacity="0.7"/>
    <!-- Highlight on candy -->
    <circle cx="96" cy="116" r="8" fill="#FBF3DE" opacity="0.35"/>
    <!-- Swipe motion arc -->
    <path d="M148,100 Q190,90 200,118 Q210,146 180,162"
          fill="none" stroke="#D9A441" stroke-width="5" stroke-dasharray="8 5"/>
    <!-- Arrow at end of swipe arc -->
    <polygon points="180,162 192,152 174,152" fill="#D9A441"/>
    <!-- Motion lines for swipe effect -->
    <line x1="158" y1="96" x2="170" y2="88" stroke="#D9A441" stroke-width="3.5" opacity="0.7"/>
    <line x1="168" y1="100" x2="182" y2="94" stroke="#D9A441" stroke-width="3" opacity="0.5"/>
  </g>
</svg>
